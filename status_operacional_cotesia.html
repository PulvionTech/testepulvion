<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Status Operacional · Cotesia · Top Gun</title>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<style>
/* ============================================================
   THEME TOKENS
============================================================ */
:root, [data-theme="light"] {
  --gold:         #b8942e;
  --gold-light:   #d9b24c;
  --gold-dim:     rgba(184,148,46,0.10);
  --gold-border:  rgba(184,148,46,0.28);

  --bg:           #f0ede6;
  --card:         #ffffff;
  --surface:      #f5f2eb;
  --surface-2:    #ebe7dd;
  --input-bg:     #f8f6f1;
  --input-ro:     #ede9e0;

  --header-bg:    rgba(240,237,230,0.97);
  --header-bdr:   rgba(184,148,46,0.22);

  --text:         #0d1117;
  --text-muted:   #4b5563;
  --text-label:   #94a3b8;

  --success:      #16a34a;
  --success-dim:  rgba(22,163,74,0.10);
  --success-bdr:  rgba(22,163,74,0.30);
  --warning:      #d97706;
  --warning-dim:  rgba(217,119,6,0.10);
  --warning-bdr:  rgba(217,119,6,0.32);
  --danger:       #dc2626;
  --danger-dim:   rgba(220,38,38,0.08);
  --danger-bdr:   rgba(220,38,38,0.28);
  --info:         #2563eb;
  --info-dim:     rgba(37,99,235,0.08);
  --info-bdr:     rgba(37,99,235,0.28);

  --shadow-sm:    0 2px 8px rgba(0,0,0,0.06);
  --shadow-md:    0 4px 20px rgba(0,0,0,0.07);
  --radius:       12px;
  --radius-sm:    8px;
}

[data-theme="dark"] {
  --gold:         #d9b24c;
  --gold-light:   #f0d078;
  --gold-dim:     rgba(217,178,76,0.10);
  --gold-border:  rgba(217,178,76,0.28);

  --bg:           #060912;
  --card:         #0c1224;
  --surface:      #0f1628;
  --surface-2:    rgba(255,255,255,0.04);
  --input-bg:     #0b1425;
  --input-ro:     #0f182c;

  --header-bg:    rgba(10,15,31,0.97);
  --header-bdr:   rgba(217,178,76,0.22);

  --text:         #f0ece4;
  --text-muted:   #9ca3af;
  --text-label:   #6b7280;

  --success:      #22c55e;
  --success-dim:  rgba(34,197,94,0.10);
  --success-bdr:  rgba(34,197,94,0.30);
  --warning:      #f59e0b;
  --warning-dim:  rgba(245,158,11,0.12);
  --warning-bdr:  rgba(245,158,11,0.35);
  --danger:       #ef4444;
  --danger-dim:   rgba(239,68,68,0.10);
  --danger-bdr:   rgba(239,68,68,0.30);
  --info:         #60a5fa;
  --info-dim:     rgba(96,165,250,0.10);
  --info-bdr:     rgba(96,165,250,0.28);

  --shadow-sm:    0 2px 8px rgba(0,0,0,0.20);
  --shadow-md:    0 8px 28px rgba(0,0,0,0.30);
  --radius:       12px;
  --radius-sm:    8px;
}

/* ============================================================
   BASE
============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: 'Barlow', sans-serif;
  font-size: 15px;
  line-height: 1.6;
  color: var(--text);
  background: var(--bg);
  padding-bottom: 32px;
  transition: background 0.3s, color 0.3s;
}

[data-theme="light"] body {
  background-image: radial-gradient(ellipse 70% 40% at 5% 0%, rgba(184,148,46,0.06) 0%, transparent 55%);
}

h1, h2, h3 {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  letter-spacing: 0.01em;
}

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--gold-border); border-radius: 4px; }

/* ============================================================
   HEADER
============================================================ */
.site-header {
  position: sticky;
  top: 0;
  z-index: 50;
  background: var(--header-bg);
  border-bottom: 1px solid var(--header-bdr);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  box-shadow: var(--shadow-sm);
  transition: background 0.3s, border-color 0.3s;
}

.header-inner {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 16px;
  height: 60px;
  max-width: 600px;
  margin: 0 auto;
}

.header-title {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-size: 1.05rem;
  font-weight: 800;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--gold);
}

/* ============================================================
   BUTTONS
============================================================ */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  cursor: pointer;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 0.95rem;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  text-decoration: none;
  border-radius: var(--radius-sm);
  padding: 10px 16px;
  border: 1px solid var(--gold-border);
  background: var(--gold-dim);
  color: var(--gold);
  transition: all 0.2s ease;
  -webkit-tap-highlight-color: transparent;
  white-space: nowrap;
}
.btn:hover { background: rgba(184,148,46,0.18); border-color: var(--gold); }

.btn-primary {
  background: var(--gold);
  border-color: var(--gold);
  color: #fff;
  box-shadow: 0 4px 14px rgba(184,148,46,0.25);
}
[data-theme="dark"] .btn-primary { color: #0b0f1f; }
.btn-primary:hover { background: var(--gold-light); border-color: var(--gold-light); }

.btn-ghost {
  background: var(--surface);
  border-color: rgba(0,0,0,0.08);
  color: var(--text-muted);
}
[data-theme="dark"] .btn-ghost { border-color: rgba(255,255,255,0.08); }
.btn-ghost:hover { background: var(--surface-2); color: var(--text); border-color: var(--gold-border); }

.btn-sm { padding: 7px 12px; font-size: 0.82rem; }
.btn-full { width: 100%; }

.theme-toggle {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 34px; height: 34px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--gold-border);
  background: var(--gold-dim);
  color: var(--gold);
  cursor: pointer;
  transition: all 0.2s;
  flex-shrink: 0;
}
.theme-toggle:hover { background: rgba(184,148,46,0.2); border-color: var(--gold); transform: rotate(20deg); }

/* ============================================================
   LAYOUT
============================================================ */
.wrap {
  max-width: 600px;
  margin: 0 auto;
  padding: 18px 16px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

/* ============================================================
   CARDS
============================================================ */
.card {
  background: var(--card);
  border: 1px solid var(--gold-border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-md);
  overflow: hidden;
  transition: background 0.3s, border-color 0.3s;
}

.card-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 18px;
  border-bottom: 1px solid var(--gold-border);
  background: var(--gold-dim);
}

.card-header-icon {
  width: 32px; height: 32px;
  border-radius: 8px;
  border: 1px solid var(--gold-border);
  background: var(--card);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--gold);
  flex-shrink: 0;
}

.card-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.95rem;
  font-weight: 800;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text);
  flex: 1;
}

.card-badge {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.12em;
  color: var(--text-label);
  padding: 3px 8px;
  border-radius: 999px;
  border: 1px solid var(--gold-border);
  background: var(--card);
}

.card-body { padding: 18px; }

/* ============================================================
   FIELDS
============================================================ */
.field-group { display: flex; flex-direction: column; gap: 12px; }

.field {
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.field label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.65rem;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-label);
}

input, select, textarea {
  width: 100%;
  background: var(--input-bg);
  color: var(--text);
  border: 1px solid var(--gold-border);
  border-radius: var(--radius-sm);
  padding: 11px 14px;
  font-family: 'Barlow', sans-serif;
  font-size: 0.95rem;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  -webkit-appearance: none;
  -webkit-tap-highlight-color: transparent;
}
input:focus, select:focus, textarea:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px var(--gold-dim);
}
input[readonly], input[readonly]:focus {
  background: var(--input-ro);
  color: var(--text-muted);
  border-color: rgba(0,0,0,0.08);
  box-shadow: none;
  cursor: default;
}
[data-theme="dark"] input[readonly] { border-color: rgba(255,255,255,0.06); }
select { cursor: pointer; }
textarea { resize: vertical; min-height: 80px; }

/* OS search row */
.os-search-row {
  display: flex;
  gap: 8px;
  align-items: flex-end;
}
.os-search-row .field { flex: 1; }
.os-search-row .os-input {
  font-family: 'IBM Plex Mono', monospace !important;
  font-weight: 500 !important;
}

/* OS lookup status */
.lookup-status {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.68rem;
  letter-spacing: 0.06em;
  min-height: 18px;
  color: var(--text-label);
  padding: 2px 0;
}
.lookup-status.ok   { color: var(--success); }
.lookup-status.warn { color: var(--warning); }
.lookup-status.err  { color: var(--danger); }

/* Fields grid 2-col */
.fields-2col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

/* ============================================================
   STATUS SELECTOR — visual card group
============================================================ */
.status-group {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.status-opt {
  position: relative;
  cursor: pointer;
}

.status-opt input[type="radio"] {
  position: absolute;
  opacity: 0;
  width: 0; height: 0;
}

.status-opt-label {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 5px;
  padding: 12px 8px;
  border-radius: 10px;
  border: 2px solid var(--gold-border);
  background: var(--surface);
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

.status-opt-label .s-emoji { font-size: 1.3rem; line-height: 1; }
.status-opt-label .s-text {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.8rem;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--text-muted);
  line-height: 1.2;
}

.status-opt:hover .status-opt-label {
  border-color: var(--gold-border);
  background: var(--gold-dim);
}

/* Active states per status type */
.status-opt input:checked ~ .status-opt-label {
  border-width: 2px;
  font-weight: 800;
}

.status-opt.s-andamento input:checked ~ .status-opt-label {
  border-color: var(--warning);
  background: var(--warning-dim);
  box-shadow: 0 0 0 3px rgba(217,119,6,0.12);
}
.status-opt.s-andamento input:checked ~ .status-opt-label .s-text { color: var(--warning); }

.status-opt.s-deslocamento input:checked ~ .status-opt-label {
  border-color: var(--info);
  background: var(--info-dim);
  box-shadow: 0 0 0 3px rgba(37,99,235,0.10);
}
.status-opt.s-deslocamento input:checked ~ .status-opt-label .s-text { color: var(--info); }

.status-opt.s-finalizada input:checked ~ .status-opt-label {
  border-color: var(--success);
  background: var(--success-dim);
  box-shadow: 0 0 0 3px rgba(22,163,74,0.12);
}
.status-opt.s-finalizada input:checked ~ .status-opt-label .s-text { color: var(--success); }

.status-opt.s-aguardando input:checked ~ .status-opt-label {
  border-color: var(--danger);
  background: var(--danger-dim);
  box-shadow: 0 0 0 3px rgba(220,38,38,0.10);
}
.status-opt.s-aguardando input:checked ~ .status-opt-label .s-text { color: var(--danger); }

/* ============================================================
   CONDITION CHIPS (Motivo)
============================================================ */
.cond-box {
  display: none;
  flex-direction: column;
  gap: 10px;
  padding: 14px;
  border-radius: 10px;
  border: 1px solid var(--danger-bdr);
  background: var(--danger-dim);
  margin-top: 2px;
}
.cond-box.show { display: flex; }

.cond-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.63rem;
  font-weight: 500;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--danger);
}

.chip-row { display: flex; gap: 8px; flex-wrap: wrap; }

.chip-opt { position: relative; cursor: pointer; }
.chip-opt input[type="radio"] { position: absolute; opacity: 0; width: 0; height: 0; }

.chip-opt-label {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border-radius: 999px;
  border: 1px solid var(--danger-bdr);
  background: var(--card);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.82rem;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.2s;
  user-select: none;
}

.chip-opt-label:hover { background: var(--danger-dim); color: var(--danger); }

.chip-opt input:checked ~ .chip-opt-label {
  background: var(--danger);
  border-color: var(--danger);
  color: #fff;
}

/* Obs textarea inside cond-box */
.obs-box { display: none; flex-direction: column; gap: 5px; }
.obs-box.show { display: flex; }
.obs-box textarea {
  border-color: var(--danger-bdr);
  background: var(--card);
}
.obs-box textarea:focus { border-color: var(--danger); box-shadow: 0 0 0 3px var(--danger-dim); }

/* ============================================================
   PREVIEW
============================================================ */
.preview-box {
  white-space: pre-wrap;
  background: var(--input-bg);
  border: 1px solid var(--gold-border);
  border-radius: var(--radius-sm);
  padding: 16px;
  min-height: 180px;
  max-height: 280px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.82rem;
  line-height: 1.75;
  overflow: auto;
  color: var(--text);
}

/* ============================================================
   ACTION BUTTONS
============================================================ */
.action-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.action-grid .span2 { grid-column: 1 / -1; }

.divider { height: 1px; background: var(--gold-border); margin: 4px 0; }

/* Status toast */
.status-badge {
  display: none;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 6px 14px;
  border-radius: 999px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.65rem;
  font-weight: 500;
  letter-spacing: 0.08em;
  border: 1px solid var(--gold-border);
  background: var(--gold-dim);
  color: var(--text-label);
}
.status-badge.ok   { display: inline-flex; color: var(--success); border-color: var(--success-bdr); background: var(--success-dim); }
.status-badge.warn { display: inline-flex; color: var(--warning); border-color: var(--warning-bdr); background: var(--warning-dim); }

/* ============================================================
   READONLY INFO GRID
============================================================ */
.info-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.info-cell {
  background: var(--surface);
  border: 1px solid var(--gold-border);
  border-radius: 8px;
  padding: 10px 12px;
  transition: background 0.3s;
}

.info-cell .i-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.58rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-label);
  margin-bottom: 4px;
}

.info-cell .i-val {
  font-family: 'Barlow', sans-serif;
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.info-cell.full { grid-column: 1 / -1; }

/* ============================================================
   RESPONSIVE
============================================================ */
@media (max-width: 480px) {
  .header-title { font-size: 0.88rem; }
  .status-group { grid-template-columns: 1fr 1fr; }
  .fields-2col  { grid-template-columns: 1fr; }
  .info-grid    { grid-template-columns: 1fr; }
  .action-grid  { grid-template-columns: 1fr; }
  .action-grid .span2 { grid-column: 1; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="site-header">
  <div class="header-inner">
    <a class="btn btn-sm" href="operacional.html" title="Voltar">
      <i data-lucide="arrow-left" width="14" height="14"></i>
      Voltar
    </a>
    <div class="header-title">
      <i data-lucide="activity" width="17" height="17"></i>
      Status Operacional · Cotesia
    </div>
    <button class="theme-toggle" id="themeToggle" title="Alternar tema">
      <i data-lucide="moon" width="15" height="15" id="themeIcon"></i>
    </button>
  </div>
</header>

<div class="wrap">

  <!-- ── Identificação ──────────────────────────────────── -->
  <div class="card">
    <div class="card-header">
      <div class="card-header-icon">
        <i data-lucide="clipboard-list" width="16" height="16"></i>
      </div>
      <span class="card-title">Identificação</span>
      <span class="card-badge">Etapa 1</span>
    </div>
    <div class="card-body">
      <div class="field-group">

        <div class="fields-2col">
          <div class="field">
            <label>Data</label>
            <input type="date" id="dtData">
          </div>
          <div class="field">
            <label>Horário</label>
            <input type="text" id="txtHora" readonly>
          </div>
        </div>

        <div class="fields-2col">
          <div class="field">
            <label>Frente</label>
            <select id="selFrente">
              <option value="">Selecione…</option>
              <option value="01">01</option>
              <option value="02">02</option>
              <option value="03">03</option>
              <option value="04">04</option>
            </select>
          </div>
          <div class="field">
            <label>Piloto</label>
            <input type="text" id="txtPiloto" readonly placeholder="Auto">
          </div>
        </div>

        <!-- OS lookup -->
        <div class="os-search-row">
          <div class="field">
            <label>Nº OS</label>
            <input type="text" id="txtOS" class="os-input" placeholder="Digite a OS…">
          </div>
          <button class="btn btn-sm" id="btnBuscar" style="margin-bottom:1px;">
            <i data-lucide="search" width="13" height="13"></i>
            Buscar
          </button>
        </div>
        <div class="lookup-status" id="lookupStatus"></div>

      </div>
    </div>
  </div>

  <!-- ── Dados da OS ─────────────────────────────────────── -->
  <div class="card">
    <div class="card-header">
      <div class="card-header-icon">
        <i data-lucide="map-pin" width="16" height="16"></i>
      </div>
      <span class="card-title">Dados da OS</span>
      <span class="card-badge">Auto-preenchido</span>
    </div>
    <div class="card-body">
      <div class="info-grid">
        <div class="info-cell">
          <div class="i-label">Fazenda</div>
          <div class="i-val" id="dispFaz">—</div>
          <input type="hidden" id="txtFaz">
        </div>
        <div class="info-cell">
          <div class="i-label">Código</div>
          <div class="i-val" id="dispCod">—</div>
          <input type="hidden" id="txtCod">
        </div>
        <div class="info-cell">
          <div class="i-label">Unidade</div>
          <div class="i-val" id="dispUnidade">—</div>
          <input type="hidden" id="txtUnidade">
        </div>
        <div class="info-cell">
          <div class="i-label">Qtd. Tubetes</div>
          <div class="i-val" id="dispTubetes">—</div>
          <input type="hidden" id="txtTubetes">
        </div>
      </div>
    </div>
  </div>

  <!-- ── Status da Operação ─────────────────────────────── -->
  <div class="card">
    <div class="card-header">
      <div class="card-header-icon">
        <i data-lucide="zap" width="16" height="16"></i>
      </div>
      <span class="card-title">Status da Operação</span>
      <span class="card-badge">Etapa 2</span>
    </div>
    <div class="card-body" style="display:flex;flex-direction:column;gap:14px;">

      <div class="status-group" id="statusGroup">

        <label class="status-opt s-andamento">
          <input type="radio" name="selStatus" value="🟡 Em andamento" checked onchange="onStatusChange()">
          <div class="status-opt-label">
            <span class="s-emoji">🟡</span>
            <span class="s-text">Em<br>Andamento</span>
          </div>
        </label>

        <label class="status-opt s-deslocamento">
          <input type="radio" name="selStatus" value="🚌 Em deslocamento" onchange="onStatusChange()">
          <div class="status-opt-label">
            <span class="s-emoji">🚌</span>
            <span class="s-text">Em<br>Deslocamento</span>
          </div>
        </label>

        <label class="status-opt s-finalizada">
          <input type="radio" name="selStatus" value="✅ Finalizada" onchange="onStatusChange()">
          <div class="status-opt-label">
            <span class="s-emoji">✅</span>
            <span class="s-text">Finalizada</span>
          </div>
        </label>

        <label class="status-opt s-aguardando">
          <input type="radio" name="selStatus" value="⛔️ Ag. Condições" onchange="onStatusChange()">
          <div class="status-opt-label">
            <span class="s-emoji">⛔️</span>
            <span class="s-text">Ag.<br>Condições</span>
          </div>
        </label>

      </div>

      <!-- Cond box (only visible on Ag. Condições) -->
      <div class="cond-box" id="condBox">
        <span class="cond-label">Motivo da Paralisação</span>
        <div class="chip-row" id="condOptions">
          <label class="chip-opt">
            <input type="radio" name="cond" value="Chuva" onchange="onCondChange()">
            <span class="chip-opt-label">🌧 Chuva</span>
          </label>
          <label class="chip-opt">
            <input type="radio" name="cond" value="Vento" onchange="onCondChange()">
            <span class="chip-opt-label">💨 Vento</span>
          </label>
          <label class="chip-opt">
            <input type="radio" name="cond" value="Clima" onchange="onCondChange()">
            <span class="chip-opt-label">⛅ Clima</span>
          </label>
          <label class="chip-opt">
            <input type="radio" name="cond" value="Outros" onchange="onCondChange()">
            <span class="chip-opt-label">✏️ Outros</span>
          </label>
        </div>

        <div class="obs-box" id="obsBox">
          <label style="font-family:'IBM Plex Mono',monospace;font-size:.63rem;letter-spacing:.12em;text-transform:uppercase;color:var(--danger);">Observação</label>
          <textarea id="txtObs" placeholder="Descreva o motivo…" oninput="gerarPrevia()"></textarea>
        </div>
      </div>

    </div>
  </div>

  <!-- ── Prévia & Ações ───────────────────────────────────── -->
  <div class="card">
    <div class="card-header">
      <div class="card-header-icon">
        <i data-lucide="eye" width="16" height="16"></i>
      </div>
      <span class="card-title">Prévia WhatsApp</span>
      <span class="card-badge">Etapa 3</span>
    </div>
    <div class="card-body" style="display:flex;flex-direction:column;gap:14px;">

      <div class="preview-box" id="preview"></div>

      <div class="divider"></div>

      <div class="action-grid">
        <button class="btn btn-primary span2" onclick="gerarPrevia()">
          <i data-lucide="refresh-cw" width="15" height="15"></i>
          Gerar Prévia
        </button>
        <button class="btn btn-ghost" onclick="copiarMsg()">
          <i data-lucide="copy" width="15" height="15"></i>
          Copiar
        </button>
        <button class="btn" onclick="abrirWhats()">
          <i data-lucide="message-circle" width="15" height="15"></i>
          WhatsApp
        </button>
      </div>

      <div style="display:flex;justify-content:center;">
        <span class="status-badge" id="lblInfo"></span>
      </div>

    </div>
  </div>

</div><!-- /wrap -->

<script>
/* ============================================================
   THEME
============================================================ */
const html = document.documentElement;
const themeToggle = document.getElementById('themeToggle');
const themeIcon   = document.getElementById('themeIcon');

function applyTheme(t) {
  html.setAttribute('data-theme', t);
  localStorage.setItem('pulvion_theme', t);
  themeIcon.setAttribute('data-lucide', t === 'dark' ? 'sun' : 'moon');
  lucide.createIcons();
  themeToggle.title = t === 'dark' ? 'Modo claro' : 'Modo escuro';
}

(function() { applyTheme(localStorage.getItem('pulvion_theme') || 'light'); })();
themeToggle.addEventListener('click', () => applyTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'));

/* ============================================================
   LUCIDE
============================================================ */
lucide.createIcons();

/* ============================================================
   PILOTO AUTOMÁTICO
============================================================ */
/* ── SESSÃO ── */
function getSession(){
  try{ return JSON.parse(localStorage.getItem('pulvion_session')||'{}'); }
  catch(_){ return {}; }
}

function applySessionToForm(){
  const s = getSession();
  if (!s || !s.username) return;

  const pilEl = document.getElementById('txtPiloto');
  const frEl  = document.getElementById('selFrente');

  // Preenche nome do piloto
  if (pilEl && s.nome) {
    pilEl.value    = s.nome;
    pilEl.readOnly = true;
    pilEl.style.opacity = '0.75';
  }

  // Se piloto tem frente definida: trava o campo
  if (s.role === 'piloto' && s.frente) {
    if (frEl) {
      const input = document.createElement('input');
      input.type     = 'text';
      input.id       = 'selFrente';
      input.value    = String(s.frente).padStart(2,'0');
      input.readOnly = true;
      input.style.opacity = '0.75';
      input.style.cursor  = 'not-allowed';
      input.className = frEl.className;
      frEl.parentNode.replaceChild(input, frEl);
    }
  }

  gerarPrevia();
}

// Listener manual de frente (quando não travado pela sessão)
const _frEl = document.getElementById('selFrente');
if (_frEl) {
  _frEl.addEventListener('change', () => gerarPrevia());
}

/* ============================================================
   DATA / HORA INICIAL
============================================================ */
document.getElementById('dtData').value = new Date().toISOString().split('T')[0];
document.getElementById('txtHora').value = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });

/* ============================================================
   OS LOOKUP
============================================================ */
const API_URL  = 'https://script.google.com/macros/s/AKfycbylamuKlb6-OWIhs4qNfRZ9WB7o_X2pBW7jrRchnnNe5RrKvsOUv7lWhj4JbMqS67OOow/exec';
const AUTH_URL = 'https://script.google.com/macros/s/AKfycbzqL0jofgg8B4viY7NyqWjaE36AwiK2IEqDWM2A5WXwlJb06p_xqo11TdIu4ubl28pl/exec';

/* ── JSONP — funciona com file:// (sem CORS) ── */
function jsonpGet(url, params) {
  return new Promise((resolve, reject) => {
    const cbName = '_cb' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const qs = Object.entries({...params, callback: cbName})
      .map(([k,v]) => encodeURIComponent(k) + '=' + encodeURIComponent(v)).join('&');
    const script = document.createElement('script');
    script.src = url + '?' + qs;
    let done = false;
    window[cbName] = (data) => { done=true; delete window[cbName]; script.remove(); resolve(data); };
    script.onerror = () => { if(!done){ delete window[cbName]; script.remove(); reject(new Error('Falha de conexão.')); } };
    setTimeout(() => { if(!done){ delete window[cbName]; script.remove(); reject(new Error('Timeout')); } }, 12000);
    document.head.appendChild(script);
  });
}

function setLookupStatus(msg, type = '') {
  const el = document.getElementById('lookupStatus');
  el.textContent = msg;
  el.className   = 'lookup-status' + (type ? ' ' + type : '');
}

function setOsData(faz, cod, uni, tub) {
  // visible display cells
  document.getElementById('dispFaz').textContent     = faz  || '—';
  document.getElementById('dispCod').textContent     = cod  || '—';
  document.getElementById('dispUnidade').textContent = uni  || '—';
  document.getElementById('dispTubetes').textContent = tub  || '—';
  // hidden inputs (used in buildMessage)
  document.getElementById('txtFaz').value     = faz  || '';
  document.getElementById('txtCod').value     = cod  || '';
  document.getElementById('txtUnidade').value = uni  || '';
  document.getElementById('txtTubetes').value = tub  || '';
}

async function buscarOS() {
  const os = document.getElementById('txtOS').value.trim();
  if (!os) { setLookupStatus('Informe o número da OS.', 'warn'); return; }

  setLookupStatus('Buscando…');

  try {
    const data = await jsonpGet(API_URL, { action: 'lookup', os });

    if (data.ok && data.found) {
      const it = data.items[0];
      const TUBETE_FIELDS = ['copos','tubetes','tubete','qtd_copos','qtd_tubetes','qtcopos','qtd_tubete','copos_qtd','tubetes_qtd'];
      let tub = '';
      for (const f of TUBETE_FIELDS) {
        if (it[f] && !isNaN(it[f])) { tub = it[f]; break; }
      }
      setOsData(it.fazenda || '', it.codigo || '', it.unidade || '', tub);
      setLookupStatus('✓ OS carregada com sucesso', 'ok');
      gerarPrevia();
    } else {
      setLookupStatus('OS não encontrada na planilha.', 'warn');
    }
  } catch (err) {
    setLookupStatus(`Falha na busca: ${err.message || err}`, 'err');
  }
}

document.getElementById('btnBuscar').addEventListener('click', buscarOS);
document.getElementById('txtOS').addEventListener('keydown', e => { if (e.key === 'Enter') buscarOS(); });

/* ============================================================
   STATUS & CONDIÇÃO
============================================================ */
function getStatusValue() {
  const checked = document.querySelector('input[name="selStatus"]:checked');
  return checked ? checked.value : '';
}

function onStatusChange() {
  const val     = getStatusValue();
  const condBox = document.getElementById('condBox');
  const obsBox  = document.getElementById('obsBox');

  if (val.includes('Ag. Condições')) {
    condBox.classList.add('show');
  } else {
    condBox.classList.remove('show');
    obsBox.classList.remove('show');
    const checked = document.querySelector('input[name="cond"]:checked');
    if (checked) checked.checked = false;
    document.getElementById('txtObs').value = '';
  }
  gerarPrevia();
}

function onCondChange() {
  const condSel = document.querySelector('input[name="cond"]:checked');
  const obsBox  = document.getElementById('obsBox');
  if (condSel && condSel.value === 'Outros') {
    obsBox.classList.add('show');
  } else {
    obsBox.classList.remove('show');
    document.getElementById('txtObs').value = '';
  }
  gerarPrevia();
}

/* ============================================================
   PREVIEW
============================================================ */
function gerarPrevia() {
  const dt  = document.getElementById('dtData').value.split('-').reverse().join('/');
  const fr  = document.getElementById('selFrente').value || '—';
  const pi  = document.getElementById('txtPiloto').value || '—';
  const os  = document.getElementById('txtOS').value     || '—';
  const faz = document.getElementById('txtFaz').value    || '—';
  const cod = document.getElementById('txtCod').value    || '—';
  const hr  = document.getElementById('txtHora').value   || '—';
  const uni = document.getElementById('txtUnidade').value || '—';
  const tub = document.getElementById('txtTubetes').value;
  const st  = getStatusValue();
  const condSel = (document.querySelector('input[name="cond"]:checked') || {}).value || '';
  const obs = document.getElementById('txtObs').value;

  let msg = `*Status Operação Cotesia*\n\n`;
  msg += `*Frente:* ${fr}\n*Piloto:* ${pi}\n*Data:* ${dt}\n*Horário:* ${hr}\n*OS:* ${os}\n*Faz:* ${faz}\n*Cód.:* ${cod}\n*Unidade:* ${uni}`;
  if (tub) msg += `\n*Qtd. Tubetes:* ${tub}`;
  msg += `\n\n*Status da operação:* ${st}`;

  if (st.includes('Ag. Condições')) {
    msg += `\n*Motivo:* ${condSel || 'Não informado'}`;
    if (obs) msg += `\nObs.: ${obs}`;
  }
  if (st.includes('Finalizada')) msg += `\n\n--- OPERAÇÃO FINALIZADA ✅ ---`;

  document.getElementById('preview').textContent = msg;
}

/* ============================================================
   ACTIONS
============================================================ */
function showStatus(msg, type) {
  const badge = document.getElementById('lblInfo');
  badge.textContent = msg;
  badge.className   = 'status-badge ' + type;
  setTimeout(() => { badge.className = 'status-badge'; }, 2200);
}

async function copiarMsg() {
  try {
    await navigator.clipboard.writeText(document.getElementById('preview').textContent);
    showStatus('✓ Copiado!', 'ok');
  } catch (_) {
    showStatus('Falha ao copiar', 'warn');
  }
}

function abrirWhats() {
  window.open('https://wa.me/?text=' + encodeURIComponent(document.getElementById('preview').textContent), '_blank');
}

/* ============================================================
   LIVE PREVIEW on field changes
============================================================ */
['dtData', 'selFrente', 'txtOS', 'txtObs'].forEach(id => {
  const el = document.getElementById(id);
  if (!el) return;
  el.addEventListener(el.tagName === 'SELECT' ? 'change' : 'input', () => gerarPrevia());
});

/* ============================================================
   INIT
============================================================ */
applySessionToForm();
gerarPrevia();
</script>
</body>
</html>
