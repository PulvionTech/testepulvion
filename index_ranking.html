<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Portal DJI · Ranking Admin</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<style>
/* ============================================================
   THEME TOKENS
============================================================ */
:root, [data-theme="light"] {
  --gold:        #b8942e;
  --gold-light:  #d9b24c;
  --gold-dim:    rgba(184,148,46,0.10);
  --gold-border: rgba(184,148,46,0.28);

  --bg:          #f0ede6;
  --card:        #ffffff;
  --surface:     #f5f2eb;
  --surface-2:   #ebe7dd;
  --input-bg:    #f8f6f1;

  --header-bg:   rgba(240,237,230,0.97);
  --header-bdr:  rgba(184,148,46,0.22);

  --text:        #0d1117;
  --text-muted:  #4b5563;
  --text-label:  #94a3b8;

  --success:     #16a34a;
  --success-dim: rgba(22,163,74,0.10);
  --success-bdr: rgba(22,163,74,0.28);
  --danger:      #dc2626;
  --danger-dim:  rgba(220,38,38,0.08);
  --danger-bdr:  rgba(220,38,38,0.28);
  --info:        #0ea5e9;
  --info-dim:    rgba(14,165,233,0.10);
  --info-bdr:    rgba(14,165,233,0.28);

  --tbl-head-bg: var(--gold);
  --tbl-head-text: #fff;
  --tbl-row:     var(--card);
  --tbl-row-alt: var(--surface);
  --tbl-border:  rgba(184,148,46,0.14);
  --tbl-hover:   var(--gold-dim);

  --shadow-sm:   0 2px 8px rgba(0,0,0,0.06);
  --shadow-md:   0 4px 20px rgba(0,0,0,0.08);
  --shadow-lg:   0 12px 40px rgba(0,0,0,0.10);
  --radius:      12px;
  --radius-sm:   8px;
}
[data-theme="dark"] {
  --gold:        #d9b24c;
  --gold-light:  #f0d078;
  --gold-dim:    rgba(217,178,76,0.10);
  --gold-border: rgba(217,178,76,0.28);

  --bg:          #060912;
  --card:        #0c1224;
  --surface:     #0f1628;
  --surface-2:   rgba(255,255,255,0.04);
  --input-bg:    #0b1425;

  --header-bg:   rgba(10,15,31,0.97);
  --header-bdr:  rgba(217,178,76,0.22);

  --text:        #f0ece4;
  --text-muted:  #9ca3af;
  --text-label:  #6b7280;

  --success:     #22c55e;
  --success-dim: rgba(34,197,94,0.10);
  --success-bdr: rgba(34,197,94,0.28);
  --danger:      #ef4444;
  --danger-dim:  rgba(239,68,68,0.10);
  --danger-bdr:  rgba(239,68,68,0.30);
  --info:        #38bdf8;
  --info-dim:    rgba(56,189,248,0.10);
  --info-bdr:    rgba(56,189,248,0.28);

  --tbl-head-bg: rgba(217,178,76,1);
  --tbl-head-text: #0b0f1f;
  --tbl-row:     rgba(255,255,255,0.015);
  --tbl-row-alt: rgba(255,255,255,0.028);
  --tbl-border:  rgba(255,255,255,0.05);
  --tbl-hover:   rgba(217,178,76,0.08);

  --shadow-sm:   0 2px 8px rgba(0,0,0,0.30);
  --shadow-md:   0 8px 28px rgba(0,0,0,0.40);
  --shadow-lg:   0 16px 48px rgba(0,0,0,0.50);
  --radius:      12px;
  --radius-sm:   8px;
}

/* ============================================================
   BASE
============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Barlow', sans-serif; font-size: 15px; line-height: 1.6;
  color: var(--text); background: var(--bg); min-height: 100vh;
  transition: background 0.3s, color 0.3s;
}
[data-theme="dark"] body {
  background:
    radial-gradient(circle at 10% 20%, rgba(217,178,76,0.06), transparent 32%),
    radial-gradient(circle at 85% 5%,  rgba(255,255,255,0.04), transparent 38%),
    var(--bg);
}
[data-theme="light"] body {
  background-image: radial-gradient(ellipse 70% 40% at 5% 0%, rgba(184,148,46,0.06) 0%, transparent 55%);
}
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-thumb { background: var(--gold-border); border-radius: 4px; }

/* ============================================================
   HEADER
============================================================ */
.site-header {
  position: sticky; top: 0; z-index: 500;
  background: var(--header-bg); border-bottom: 1px solid var(--header-bdr);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  box-shadow: var(--shadow-sm);
}
.header-inner {
  display: flex; align-items: center; gap: 10px;
  padding: 0 20px; height: 58px; max-width: 1400px; margin: 0 auto;
}
.header-brand {
  display: flex; align-items: center; gap: 8px;
  font-family: 'Barlow Condensed', sans-serif; font-size: 1.05rem; font-weight: 800;
  letter-spacing: 0.06em; text-transform: uppercase; color: var(--gold);
}
.header-brand svg { flex-shrink: 0; }
.header-divider {
  width: 1px; height: 22px; background: var(--gold-border); flex-shrink: 0;
}
.header-subtitle {
  font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; font-weight: 400;
  letter-spacing: 0.08em; color: var(--text-muted); text-transform: uppercase;
}
.header-grow { flex: 1; }
.header-badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-family: 'IBM Plex Mono', monospace; font-size: 0.6rem; font-weight: 500;
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 4px 10px; border-radius: 999px;
  border: 1px solid var(--success-bdr); background: var(--success-dim); color: var(--success);
}
.header-badge::before {
  content: ''; width: 6px; height: 6px; border-radius: 50%;
  background: var(--success); animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

/* ============================================================
   BUTTONS
============================================================ */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 7px;
  cursor: pointer; font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
  font-size: 0.85rem; letter-spacing: 0.06em; text-transform: uppercase;
  text-decoration: none; border-radius: var(--radius-sm); padding: 9px 14px;
  border: 1px solid var(--gold-border); background: var(--gold-dim); color: var(--gold);
  transition: all 0.18s ease; white-space: nowrap;
}
.btn svg { width: 14px; height: 14px; stroke: currentColor; stroke-width: 1.8; fill: none; flex-shrink: 0; }
.btn:hover:not(:disabled) { background: rgba(184,148,46,0.18); border-color: var(--gold); }
.btn:disabled { opacity: 0.38; cursor: not-allowed; }

.btn-primary {
  background: var(--gold); border-color: var(--gold); color: #fff;
  box-shadow: 0 4px 14px rgba(184,148,46,0.30);
}
[data-theme="dark"] .btn-primary { color: #0b0f1f; }
.btn-primary:hover:not(:disabled) { background: var(--gold-light); border-color: var(--gold-light); }

.btn-ghost { background: var(--surface); border-color: rgba(0,0,0,0.08); color: var(--text-muted); }
[data-theme="dark"] .btn-ghost { border-color: rgba(255,255,255,0.08); }
.btn-ghost:hover:not(:disabled) { background: var(--surface-2); color: var(--text); border-color: var(--gold-border); }

.btn-sm { padding: 7px 11px; font-size: 0.78rem; }

.theme-toggle {
  display: inline-flex; align-items: center; justify-content: center;
  width: 34px; height: 34px; border-radius: var(--radius-sm);
  border: 1px solid var(--gold-border); background: var(--gold-dim);
  color: var(--gold); cursor: pointer; transition: all 0.2s; flex-shrink: 0;
}
.theme-toggle:hover { background: rgba(184,148,46,0.2); border-color: var(--gold); transform: rotate(20deg); }
.theme-toggle svg { width: 14px; height: 14px; stroke: currentColor; stroke-width: 1.8; fill: none; }

/* ============================================================
   PAGE
============================================================ */
.page-wrap {
  max-width: 1400px; margin: 0 auto; padding: 18px 20px;
  display: flex; flex-direction: column; gap: 16px;
}

/* ============================================================
   CARDS
============================================================ */
.card {
  background: var(--card); border: 1px solid var(--gold-border);
  border-radius: var(--radius); box-shadow: var(--shadow-md); overflow: hidden;
  transition: background 0.3s, border-color 0.3s;
}
.card-header {
  display: flex; align-items: center; gap: 10px; padding: 12px 18px;
  border-bottom: 1px solid var(--gold-border); background: var(--gold-dim);
}
.card-header-icon {
  width: 28px; height: 28px; border-radius: 7px; border: 1px solid var(--gold-border);
  background: var(--card); display: flex; align-items: center; justify-content: center;
  color: var(--gold); flex-shrink: 0;
}
.card-header-icon svg { width: 14px; height: 14px; stroke: currentColor; stroke-width: 1.8; fill: none; }
.card-title {
  font-family: 'Barlow Condensed', sans-serif; font-size: 0.9rem; font-weight: 800;
  letter-spacing: 0.06em; text-transform: uppercase; color: var(--text); flex: 1;
}
.card-badge {
  font-family: 'IBM Plex Mono', monospace; font-size: 0.58rem; letter-spacing: 0.1em;
  color: var(--text-label); padding: 3px 8px; border-radius: 999px;
  border: 1px solid var(--gold-border); background: var(--card);
}
.card-body { padding: 18px; }

/* ============================================================
   FORM FIELDS
============================================================ */
.field { display: flex; flex-direction: column; gap: 5px; }
.field label {
  font-family: 'IBM Plex Mono', monospace; font-size: 0.63rem; font-weight: 500;
  letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-label);
}
input[type="file"],
input[type="date"],
input[type="text"],
input[type="search"],
select {
  width: 100%; background: var(--input-bg); color: var(--text);
  border: 1px solid var(--gold-border); border-radius: var(--radius-sm);
  padding: 9px 12px; font-family: 'Barlow', sans-serif; font-size: 0.88rem;
  outline: none; transition: border-color 0.2s, box-shadow 0.2s; -webkit-appearance: none;
}
input[type="file"] { cursor: pointer; }
input:focus, select:focus {
  border-color: var(--gold); box-shadow: 0 0 0 3px var(--gold-dim);
}
input::placeholder { color: var(--text-label); }
input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.5); cursor: pointer; }
[data-theme="dark"] input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.8); }

/* File input with has-file state */
.file-wrap { position: relative; }
.file-name-hint {
  margin-top: 5px; font-family: 'IBM Plex Mono', monospace; font-size: 0.62rem;
  letter-spacing: 0.04em; color: var(--success); display: none;
}
.file-wrap.has-file .file-name-hint { display: block; }
.file-wrap.has-file input[type="file"] {
  border-color: var(--success-bdr); background: var(--success-dim);
}

/* Section label */
.section-label {
  font-family: 'Barlow Condensed', sans-serif; font-size: 0.74rem; font-weight: 800;
  letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted);
  display: flex; align-items: center; gap: 6px;
}
.section-label::after { content: ''; flex: 1; height: 1px; background: var(--gold-border); }
.section-label svg { width: 12px; height: 12px; stroke: currentColor; stroke-width: 1.8; fill: none; flex-shrink: 0; }

/* ============================================================
   UPLOAD ROW
============================================================ */
.upload-row {
  display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items: end;
}
@media (max-width: 600px) { .upload-row { grid-template-columns: 1fr; } }

/* ============================================================
   FILTER BAR
============================================================ */
.filter-bar {
  display: grid; gap: 10px;
  grid-template-columns: auto 1fr 1fr 1fr auto;
  align-items: end;
}
@media (max-width: 900px) {
  .filter-bar { grid-template-columns: 1fr 1fr; }
  .filter-bar .search-field { grid-column: 1 / -1; }
  .filter-bar .btn-ranking { grid-column: 1 / -1; }
}
@media (max-width: 500px) {
  .filter-bar { grid-template-columns: 1fr; }
  .filter-bar > * { grid-column: 1 !important; }
}

/* ============================================================
   LOG BOX
============================================================ */
.log-box {
  background: var(--input-bg); border: 1px solid var(--gold-border);
  border-radius: var(--radius-sm); padding: 10px 14px;
  font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem;
  line-height: 1.65; color: var(--text-muted); letter-spacing: 0.02em;
  transition: all 0.2s; display: none;
}
.log-box.visible { display: block; }
.log-box.ok      { color: var(--success); border-color: var(--success-bdr); background: var(--success-dim); }
.log-box.err     { color: var(--danger);  border-color: var(--danger-bdr);  background: var(--danger-dim); }
.log-box.loading { color: var(--gold);    border-color: var(--gold-border);  background: var(--gold-dim); }

/* ============================================================
   STAT CHIPS
============================================================ */
.stat-strip {
  display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
}
.stat-chip {
  display: inline-flex; align-items: center; gap: 5px;
  font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; letter-spacing: 0.06em;
  padding: 4px 10px; border-radius: 999px;
  border: 1px solid var(--gold-border); background: var(--card); color: var(--text-muted);
}
.stat-chip strong { color: var(--gold); font-weight: 500; font-size: 0.68rem; }
.stat-chip.area strong { color: var(--success); }

/* ============================================================
   TABLE
============================================================ */
.table-scroll { overflow-x: auto; border-radius: var(--radius-sm); }
table {
  width: 100%; border-collapse: collapse; font-size: 0.88rem;
}
thead th {
  background: var(--tbl-head-bg); color: var(--tbl-head-text);
  font-family: 'Barlow Condensed', sans-serif; font-size: 0.78rem; font-weight: 800;
  letter-spacing: 0.06em; text-transform: uppercase;
  padding: 10px 14px; border: none; white-space: nowrap;
}
thead th:first-child { border-radius: var(--radius-sm) 0 0 0; }
thead th:last-child  { border-radius: 0 var(--radius-sm) 0 0; }
thead th.num { text-align: right; }

tbody tr { background: var(--tbl-row); border-bottom: 1px solid var(--tbl-border); transition: background 0.12s; }
tbody tr:nth-child(even) { background: var(--tbl-row-alt); }
tbody tr:hover { background: var(--tbl-hover); }
tbody td { padding: 9px 14px; color: var(--text); vertical-align: middle; }
td.td-rank {
  font-family: 'IBM Plex Mono', monospace; font-size: 0.75rem; font-weight: 500;
  color: var(--gold); min-width: 36px;
}
td.td-num {
  text-align: right; font-family: 'IBM Plex Mono', monospace; font-size: 0.82rem;
  color: var(--text); white-space: nowrap;
}
td.td-muted { color: var(--text-muted); font-family: 'IBM Plex Mono', monospace; font-size: 0.72rem; }

/* Rank medal colors */
tbody tr:nth-child(1) td.td-rank { color: #f59e0b; font-size: 0.85rem; }
tbody tr:nth-child(2) td.td-rank { color: #94a3b8; }
tbody tr:nth-child(3) td.td-rank { color: #b45309; }

/* Pilot cell */
td.td-pilot {
  font-family: 'Barlow', sans-serif; font-weight: 600; font-size: 0.88rem; color: var(--text);
}
</style>
</head>
<body>

<!-- ── HEADER ───────────────────────────────────────────── -->
<header class="site-header">
  <div class="header-inner">
    <div class="header-brand">
      <svg width="16" height="16" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" fill="none">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
        <path d="M2 17l10 5 10-5"/>
        <path d="M2 12l10 5 10-5"/>
      </svg>
      Portal DJI
    </div>
    <div class="header-divider"></div>
    <span class="header-subtitle">Upload Semanal · Admin</span>
    <div class="header-grow"></div>
    <span class="header-badge">Central atualiza sozinha</span>
    <button class="theme-toggle" id="themeToggle" title="Alternar tema">
      <svg id="themeIcon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    </button>
  </div>
</header>

<!-- ── PAGE ─────────────────────────────────────────────── -->
<div class="page-wrap">

  <!-- UPLOAD CARD -->
  <div class="card">
    <div class="card-header">
      <div class="card-header-icon">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      </div>
      <span class="card-title">Importar Planilha DJI</span>
      <span class="card-badge">XLSX</span>
    </div>
    <div class="card-body" style="display:flex;flex-direction:column;gap:14px;">

      <div class="upload-row">
        <div class="field">
          <label for="file">Arquivo de dados DJI</label>
          <div class="file-wrap" id="fileWrap">
            <input id="file" type="file" accept=".xlsx,.xls">
            <div class="file-name-hint" id="fileNameHint"></div>
          </div>
        </div>
        <button id="btnUpload" class="btn btn-primary" disabled>
          <svg viewBox="0 0 24 24"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
          Importar para Central
        </button>
      </div>

      <div id="msg" class="log-box" aria-live="polite"></div>

    </div>
  </div>

  <!-- RANKING CARD -->
  <div class="card">
    <div class="card-header">
      <div class="card-header-icon">
        <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      </div>
      <span class="card-title">Ranking de Pilotos</span>
      <div style="flex:1;"></div>
      <div class="stat-strip">
        <div class="stat-chip" id="subtitle">Aguardando…</div>
        <div class="stat-chip area" id="totals">Área total: <strong>-- ha</strong></div>
      </div>
    </div>
    <div class="card-body" style="display:flex;flex-direction:column;gap:14px;">

      <!-- Filter bar -->
      <div class="filter-bar">
        <div class="field">
          <label for="period">Período</label>
          <select id="period" style="width:160px;">
            <option value="all">Tudo</option>
            <option value="7" selected>Últimos 7 dias</option>
            <option value="30">Últimos 30 dias</option>
            <option value="90">Últimos 90 dias</option>
          </select>
        </div>
        <div class="field">
          <label for="dateFrom">Data inicial</label>
          <input id="dateFrom" type="date">
        </div>
        <div class="field">
          <label for="dateTo">Data final</label>
          <input id="dateTo" type="date">
        </div>
        <div class="field search-field">
          <label for="search">Filtrar piloto</label>
          <input id="search" type="search" placeholder="Nome do piloto…">
        </div>
        <button id="btnRanking" class="btn btn-ranking">
          <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.51"/></svg>
          Atualizar
        </button>
      </div>

      <!-- Table -->
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Piloto</th>
              <th class="num">Voos</th>
              <th class="num">Área (ha)</th>
              <th class="num">Volume (L)</th>
              <th class="num">Tempo (min)</th>
              <th class="num">L/ha</th>
              <th class="num">ha/voo</th>
            </tr>
          </thead>
          <tbody id="tb">
            <tr><td colspan="8" class="td-muted" style="text-align:center;padding:20px;">Carregue dados para ver o ranking.</td></tr>
          </tbody>
        </table>
      </div>

    </div>
  </div>

</div><!-- /page-wrap -->

<!-- THEME -->
<script>
(function(){
  const h = document.documentElement;
  // Default dark for this admin page
  const stored = localStorage.getItem('pulvion_theme') || 'dark';
  h.setAttribute('data-theme', stored);
  function applyTheme(t){
    h.setAttribute('data-theme', t);
    localStorage.setItem('pulvion_theme', t);
    const icon = document.getElementById('themeIcon');
    if(icon){
      if(t==='dark') icon.innerHTML='<circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>';
      else           icon.innerHTML='<path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>';
    }
    const btn = document.getElementById('themeToggle');
    if(btn) btn.title = t==='dark' ? 'Modo claro' : 'Modo escuro';
  }
  applyTheme(stored);
  document.addEventListener('DOMContentLoaded', ()=>{
    const btn = document.getElementById('themeToggle');
    if(btn) btn.addEventListener('click', ()=>{
      applyTheme(h.getAttribute('data-theme')==='dark' ? 'light' : 'dark');
    });
  });
})();
</script>

<!-- ALSO patch file input visual -->
<script>
document.addEventListener('DOMContentLoaded', () => {
  const fileEl = document.getElementById('file');
  const fileWrap = document.getElementById('fileWrap');
  const fileNameHint = document.getElementById('fileNameHint');
  if (fileEl) {
    fileEl.addEventListener('change', () => {
      const f = fileEl.files && fileEl.files[0];
      if (f) {
        fileWrap.classList.add('has-file');
        fileNameHint.textContent = f.name;
      } else {
        fileWrap.classList.remove('has-file');
        fileNameHint.textContent = '';
      }
    });
  }
  // Update stat chips after render
  window._updateChips = function(pilotsCount, totalArea, periodLabel) {
    const sub = document.getElementById('subtitle');
    const tot = document.getElementById('totals');
    if(sub) sub.innerHTML = `Pilotos: <strong>${pilotsCount}</strong> &nbsp;·&nbsp; ${periodLabel}`;
    if(tot) tot.innerHTML = `Área total: <strong>${totalArea} ha</strong>`;
  };
});
</script>

<script>
  // ✅ SUA URL DO WEB APP
  const WEBAPP_URL = "https://script.google.com/macros/s/AKfycby1vZSlo0QbWkonHAsstQhVZNGI9R6IwN8GUgAVNuywRVTculgmaZ4_usklWnVHMwIBdA/exec";

  const fileEl = document.getElementById("file");
  const btnUpload = document.getElementById("btnUpload");
  const btnRanking = document.getElementById("btnRanking");
  const msg = document.getElementById("msg");
  const tb = document.getElementById("tb");
  const periodEl = document.getElementById("period");
  const subtitleEl = document.getElementById("subtitle");
  const totalsEl = document.getElementById("totals");
  const dateFromEl = document.getElementById("dateFrom");
  const dateToEl = document.getElementById("dateTo");
  const searchEl = document.getElementById("search");

  function show(text, type="info"){
    const cls = type === "success" ? "ok" : type === "danger" ? "err" : type === "info" ? "loading" : type;
    msg.className = "log-box visible " + cls;
    msg.textContent = text;
  }
  function hide(){ msg.className = "log-box"; }

  fileEl.addEventListener("change", () => {
    btnUpload.disabled = !fileEl.files?.[0];
  });

  btnUpload.addEventListener("click", async () => {
    const f = fileEl.files?.[0];
    if (!f) return;

    hide();
    show("Lendo arquivo…", "info");

    const base64 = await toBase64(f);

    show("Enviando para CENTRAL (POST)…", "info");

    try {
      // POST simples (sem preflight) para evitar CORS
      const payload = JSON.stringify({
        action: "uploadAndImportXlsx",
        fileName: f.name,
        base64Data: base64
      });

      const res = await fetch(WEBAPP_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: payload
      });

      const data = await res.json();

      if (!data.ok) {
        show(data.message || "Falha ao importar.", "danger");
        return;
      }

      show(`Importado! Inseridos: ${data.inserted} | Duplicados ignorados: ${data.duplicates} | Linhas no arquivo: ${data.totalInFile}`, "success");

        await loadRanking(); // atualiza preview

    } catch (err) {
      console.error(err);
      show("Erro no upload (POST): " + (err.message || err), "danger");
    }
  });


    // Carregar ranking dos últimos 7 dias ao abrir a página
    window.addEventListener("DOMContentLoaded", () => {
      periodEl.value = "7";
      loadRanking();
    });

    btnRanking.addEventListener("click", loadRanking);
    dateFromEl.addEventListener("change", () => render(currentRows));
    dateToEl.addEventListener("change", () => render(currentRows));
    searchEl.addEventListener("input", () => render(currentRows));

  async function loadRanking(){
    hide();
    const period = periodEl.value;
    const from = dateFromEl.value;
    const to = dateToEl.value;
    show("Gerando ranking…", "info");

    try {
      // Se datas customizadas forem selecionadas, ignora o filtro de período
      let params = { action: "getRanking" };
      if (from || to) {
        if (from) params.dateFrom = from;
        if (to) params.dateTo = to;
      } else {
        params.periodDays = period;
      }
      const rows = await jsonp(WEBAPP_URL, params);
      render(rows || []);
      show("Ranking atualizado.", "success");
    } catch (err) {
      console.error(err);
      show("Erro no ranking (JSONP): " + (err.message || err), "danger");
    }
  }

  function render(rows){
    const from = dateFromEl.value ? new Date(dateFromEl.value + "T00:00:00") : null;
    const to = dateToEl.value ? new Date(dateToEl.value + "T23:59:59") : null;
    const parseDate = (val) => {
      if (!val) return null;
      // se vier intervalo "2026-01-07 16:07:56-16:19:06", usa a parte antes do traço
      const firstPart = String(val).split("-")[0].trim();
      const d1 = new Date(firstPart);
      if (!isNaN(d1.getTime())) return d1;
      const m = String(val).match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})/);
      if (m) {
        const dd = Number(m[1]), mm = Number(m[2]) - 1, yy = m[3].length === 2 ? Number("20"+m[3]) : Number(m[3]);
        const d2 = new Date(yy, mm, dd);
        return isNaN(d2.getTime()) ? null : d2;
      }
      return null;
    };

    const q = (searchEl.value || "").trim().toLowerCase();

    const filtered = rows.filter(r => {
      if (q && !String(r.pilot || "").toLowerCase().includes(q)) return false;
      const dateField =
        r.date ?? r.data ?? r.dt ?? r.flightTime ?? r["flight time"] ?? r["Flight time"] ?? r["Flight Time"];
      const d = parseDate(dateField);
      if (from && d && d < from) return false;
      if (to && d && d > to) return false;
      return true;
    });

    tb.innerHTML = "";
    if (!filtered.length){
      tb.innerHTML = `<tr><td colspan="8" class="td-muted">Sem dados no período.</td></tr>`;
      totalsEl.textContent = "Área total: -- ha";
      subtitleEl.textContent = `Pilotos: 0 · Período: ${periodEl.value === "all" ? "Tudo" : `Últimos ${periodEl.value} dias`}`;
      if(window._updateChips) window._updateChips(0, "-- ", `Período: ${periodEl.value === "all" ? "Tudo" : `Últimos ${periodEl.value} dias`}`);
      return;
    }

    let totalArea = 0;

    filtered.forEach((r, i) => {
      const areaNum = Number(String(r.area ?? 0).replace(",", "."));
      totalArea += isNaN(areaNum) ? 0 : areaNum;
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td class="td-rank">${i+1}</td>
        <td>${esc(r.pilot)}</td>
        <td class="td-num">${fmt(r.flights,0)}</td>
        <td class="td-num">${fmt(r.area,2)}</td>
        <td class="td-num">${fmt(r.volume,1)}</td>
        <td class="td-num">${fmt(r.time,0)}</td>
        <td class="td-num">${fmt(r.lpha,2)}</td>
        <td class="td-num">${fmt(r.haPerFlight,2)}</td>
      `;
      tb.appendChild(tr);
    });

    totalsEl.textContent = `Área total: ${fmt(totalArea,2)} ha`;

    const periodLabel = (() => {
      if (from || to) {
        const fmtDate = (d) => d ? d.toLocaleDateString("pt-BR") : "...";
        return `Período: ${fmtDate(from)} a ${fmtDate(to)}`;
      }
      const p = periodEl.value;
      return `Período: ${p === "all" ? "Tudo" : `Últimos ${p} dias`}`;
    })();
    subtitleEl.textContent = `Pilotos: ${filtered.length} · ${periodLabel}`;
    if(window._updateChips) window._updateChips(filtered.length, fmt(totalArea,2), periodLabel);
  }

  function fmt(n, d){
    const v = Number(n||0);
    return v.toLocaleString("pt-BR",{minimumFractionDigits:d, maximumFractionDigits:d});
  }

  function esc(s){
    return String(s ?? "").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }

  function toBase64(file){
    return new Promise((resolve,reject)=>{
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  // JSONP helper (para GET do ranking, evita CORS no GitHub)
  function jsonp(baseUrl, params) {
    return new Promise((resolve, reject) => {
      const cb = "cb_" + Math.random().toString(36).slice(2);
      params.callback = cb;

      const url = baseUrl + "?" + new URLSearchParams(params).toString();
      const script = document.createElement("script");

      window[cb] = (data) => {
        try { resolve(data); }
        finally {
          delete window[cb];
          script.remove();
        }
      };

      script.onerror = () => {
        delete window[cb];
        script.remove();
        reject(new Error("Falha ao carregar JSONP"));
      };

      script.src = url;
      document.body.appendChild(script);
    });
  }
</script>
</body>
</html>
