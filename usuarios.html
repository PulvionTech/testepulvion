<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Pulvion · Usuários</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500;600&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root,[data-theme="light"]{
  --gold:#b8942e;--gold-l:#d9b24c;--gold-dim:rgba(184,148,46,0.10);--gold-bdr:rgba(184,148,46,0.26);
  --bg:#ede9e0;--card:#faf8f4;--card2:#f5f1e8;--surface:#f0ece3;
  --header-bg:rgba(237,233,224,0.95);--header-bdr:rgba(184,148,46,0.18);
  --border:rgba(184,148,46,0.18);--border-soft:rgba(0,0,0,0.055);
  --text:#0f1117;--text2:#2d3340;--muted:#5a6273;--dim:#9ba3b0;
  --success:#16a34a;--success-dim:rgba(22,163,74,0.10);--success-bdr:rgba(22,163,74,0.25);
  --danger:#dc2626;--danger-dim:rgba(220,38,38,0.08);--danger-bdr:rgba(220,38,38,0.26);
  --info:#0284c7;--info-dim:rgba(2,132,199,0.09);--info-bdr:rgba(2,132,199,0.26);
  --sh:0 2px 10px rgba(0,0,0,0.07),0 1px 3px rgba(0,0,0,0.04);
  --sh-up:0 8px 28px rgba(0,0,0,0.10),0 2px 6px rgba(0,0,0,0.06);
  --r:14px;--rsm:9px;--rlg:20px;
}
[data-theme="dark"]{
  --gold:#d9b24c;--gold-l:#f0d078;--gold-dim:rgba(217,178,76,0.10);--gold-bdr:rgba(217,178,76,0.24);
  --bg:#060912;--card:#0c1224;--card2:#0f162c;--surface:#111826;
  --header-bg:rgba(6,9,18,0.94);--header-bdr:rgba(217,178,76,0.16);
  --border:rgba(217,178,76,0.16);--border-soft:rgba(255,255,255,0.05);
  --text:#eceae2;--text2:#c8c4ba;--muted:#8b95a8;--dim:#3f4a5c;
  --success:#22c55e;--success-dim:rgba(34,197,94,0.10);--success-bdr:rgba(34,197,94,0.28);
  --danger:#ef4444;--danger-dim:rgba(239,68,68,0.10);--danger-bdr:rgba(239,68,68,0.30);
  --info:#38bdf8;--info-dim:rgba(56,189,248,0.10);--info-bdr:rgba(56,189,248,0.28);
  --sh:0 2px 10px rgba(0,0,0,0.35),0 1px 3px rgba(0,0,0,0.22);
  --sh-up:0 8px 28px rgba(0,0,0,0.48),0 2px 6px rgba(0,0,0,0.28);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-tap-highlight-color:transparent}
body{font-family:'Barlow',sans-serif;font-size:16px;color:var(--text);background:var(--bg);min-height:100vh;transition:background .28s,color .28s;padding-bottom:32px}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--gold-bdr);border-radius:3px}

/* HEADER */
.header{position:sticky;top:0;z-index:200;background:var(--header-bg);border-bottom:1px solid var(--header-bdr);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);padding:0 16px;height:54px;display:flex;align-items:center;gap:10px}
.h-title{flex:1;text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:.82rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--text);display:flex;align-items:center;justify-content:center;gap:7px}
.h-title svg{width:14px;height:14px;stroke:var(--gold);stroke-width:1.8;fill:none}
.h-toggle{width:32px;height:32px;border-radius:var(--rsm);border:1px solid var(--gold-bdr);background:var(--gold-dim);display:flex;align-items:center;justify-content:center;color:var(--gold);cursor:pointer;flex-shrink:0}
.h-toggle svg{width:13px;height:13px;stroke:currentColor;stroke-width:1.8;fill:none}

/* PAGE */
.page{max-width:600px;margin:0 auto;padding:16px 14px 32px;display:flex;flex-direction:column;gap:12px}

/* ADD BUTTON */
.add-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;border-radius:var(--r);background:var(--gold);border:none;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:.88rem;letter-spacing:.08em;text-transform:uppercase;color:#050810;cursor:pointer;box-shadow:0 4px 16px rgba(184,148,46,0.28);transition:all .18s;animation:fadeUp .4s ease both}
.add-btn svg{width:15px;height:15px;stroke:currentColor;stroke-width:2.2;fill:none}
.add-btn:hover{filter:brightness(1.08);transform:translateY(-1px)}

/* FORM CARD */
.form-card{background:var(--card);border:1px solid var(--gold-bdr);border-radius:var(--rlg);box-shadow:var(--sh-up);overflow:hidden;animation:fadeUp .35s ease both;display:none}
.form-card.show{display:block}
.fc-header{display:flex;align-items:center;gap:10px;padding:14px 16px;background:var(--gold-dim);border-bottom:1px solid var(--gold-bdr)}
.fc-title{flex:1;font-family:'Barlow Condensed',sans-serif;font-size:.9rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--text)}
.fc-close{width:28px;height:28px;border-radius:7px;border:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;color:var(--muted);cursor:pointer;transition:all .15s}
.fc-close:hover{background:var(--danger-dim);border-color:var(--danger-bdr);color:var(--danger)}
.fc-close svg{width:12px;height:12px;stroke:currentColor;stroke-width:2.4;fill:none}
.fc-body{padding:16px;display:flex;flex-direction:column;gap:12px}

/* FIELDS */
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-family:'IBM Plex Mono',monospace;font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--dim)}
.field input,.field select{width:100%;padding:11px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rsm);font-family:'Barlow',sans-serif;font-size:.92rem;color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s;-webkit-appearance:none}
[data-theme="dark"] .field input,[data-theme="dark"] .field select{background:rgba(255,255,255,0.04)}
.field input:focus,.field select:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-dim)}
.fields-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-actions{display:flex;gap:8px;margin-top:4px}
.btn-save{flex:1;padding:12px;border-radius:var(--rsm);background:var(--success);border:none;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:.84rem;letter-spacing:.07em;text-transform:uppercase;color:#fff;cursor:pointer;transition:all .18s}
.btn-save:hover{filter:brightness(1.08)}
.btn-cancel{padding:12px 16px;border-radius:var(--rsm);background:var(--surface);border:1px solid var(--border);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.82rem;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);cursor:pointer;transition:all .18s}

/* LOG */
.log-box{padding:10px 13px;border-radius:var(--rsm);font-family:'IBM Plex Mono',monospace;font-size:.68rem;letter-spacing:.04em;border:1px solid;display:none}
.log-box.show{display:block}
.log-box.ok{background:var(--success-dim);border-color:var(--success-bdr);color:var(--success)}
.log-box.err{background:var(--danger-dim);border-color:var(--danger-bdr);color:var(--danger)}
.log-box.loading{background:var(--gold-dim);border-color:var(--gold-bdr);color:var(--gold)}

/* SECT */
.sect{font-family:'IBM Plex Mono',monospace;font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);display:flex;align-items:center;gap:8px;padding:0 2px}
.sect::after{content:'';flex:1;height:1px;background:var(--border)}

/* USER CARD */
.user-card{background:var(--card);border:1px solid var(--border);border-radius:var(--rlg);box-shadow:var(--sh);overflow:hidden;transition:border-color .2s,box-shadow .2s;animation:fadeUp .38s ease both}
.user-card:hover{box-shadow:var(--sh-up);border-color:var(--gold-bdr)}
.user-card.inactive{opacity:.55}
.uc-head{display:flex;align-items:center;gap:12px;padding:14px 16px}
.uc-avatar{width:42px;height:42px;border-radius:11px;flex-shrink:0;border:1px solid var(--gold-bdr);background:var(--gold-dim);display:flex;align-items:center;justify-content:center;color:var(--gold);font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;font-weight:900}
.uc-info{flex:1;min-width:0}
.uc-nome{font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:800;letter-spacing:.03em;text-transform:uppercase;color:var(--text);line-height:1.1}
.uc-sub{font-family:'IBM Plex Mono',monospace;font-size:.56rem;letter-spacing:.06em;color:var(--dim);margin-top:2px}
.uc-badges{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;font-family:'IBM Plex Mono',monospace;font-size:.52rem;letter-spacing:.08em;text-transform:uppercase;border:1px solid}
.badge.admin{background:var(--gold-dim);border-color:var(--gold-bdr);color:var(--gold)}
.badge.piloto{background:var(--info-dim);border-color:var(--info-bdr);color:var(--info)}
.badge.ativo{background:var(--success-dim);border-color:var(--success-bdr);color:var(--success)}
.badge.inativo{background:var(--danger-dim);border-color:var(--danger-bdr);color:var(--danger)}
.badge.frente{background:var(--surface);border-color:var(--border-soft);color:var(--muted)}

/* Actions */
.uc-actions{border-top:1px solid var(--border-soft);display:flex}
.uc-action{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:11px 8px;cursor:pointer;border:none;background:transparent;font-family:'Barlow Condensed',sans-serif;font-size:.72rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);transition:background .15s,color .15s;border-right:1px solid var(--border-soft)}
.uc-action:last-child{border-right:none}
.uc-action svg{width:13px;height:13px;stroke:currentColor;stroke-width:1.8;fill:none}
.uc-action:hover{background:var(--gold-dim);color:var(--gold)}
.uc-action.danger:hover{background:var(--danger-dim);color:var(--danger)}
.uc-action.toggle-on:hover{background:var(--danger-dim);color:var(--danger)}
.uc-action.toggle-off:hover{background:var(--success-dim);color:var(--success)}

/* STATE BOXES */
.state-box{display:flex;flex-direction:column;align-items:center;gap:12px;padding:40px 20px;text-align:center;background:var(--card);border:1px solid var(--border);border-radius:var(--rlg);box-shadow:var(--sh)}
.state-icon{width:48px;height:48px;border-radius:12px;border:1px solid var(--gold-bdr);background:var(--gold-dim);display:flex;align-items:center;justify-content:center;color:var(--gold)}
.state-icon svg{width:22px;height:22px;stroke:currentColor;stroke-width:1.6;fill:none}
.state-title{font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:800;letter-spacing:.03em;text-transform:uppercase;color:var(--text)}
.state-desc{font-size:.8rem;color:var(--muted);max-width:240px;line-height:1.65}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.spinning svg{animation:spin .7s linear infinite}
</style>
</head>
<body>

<header class="header">
  <a href="operacional.html" class="h-back">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    
  </a>
  <div class="h-title">
    <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    Gestão de Usuários
  </div>
 <!--- <button class="h-toggle" id="thToggle">
    <svg id="thIcon" viewBox="0 0 24 24"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
  </button>-->
</header>  

<main class="page">

  <!-- Botão adicionar -->
  <button class="add-btn" onclick="openForm()">
    <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Adicionar Usuário
  </button>

  <!-- Form card -->
  <div class="form-card" id="formCard">
    <div class="fc-header">
      <span class="fc-title" id="formTitle">Novo Usuário</span>
      <button class="fc-close" onclick="closeForm()">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="fc-body">
      <input type="hidden" id="editId">
      <div class="field">
        <label>Nome Completo</label>
        <input id="fNome" type="text" placeholder="Ex: Victor Hugo">
      </div>
      <div class="fields-2">
        <div class="field">
          <label>Usuário (login)</label>
          <input id="fUsuario" type="text" placeholder="Ex: victorhugo" autocapitalize="none">
        </div>
        <div class="field">
          <label>Senha</label>
          <input id="fSenha" type="text" placeholder="Ex: piloto123">
        </div>
      </div>
      <div class="fields-2">
        <div class="field">
          <label>Tipo</label>
          <select id="fTipo">
            <option value="piloto">Piloto</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <div class="field">
          <label>Frente</label>
          <select id="fFrente">
            <option value="">— Sem frente —</option>
            <option value="01">01</option>
            <option value="02">02</option>
            <option value="03">03</option>
            <option value="04">04</option>
          </select>
        </div>
      </div>
      <div class="log-box" id="formLog"></div>
      <div class="form-actions">
        <button class="btn-cancel" onclick="closeForm()">Cancelar</button>
        <button class="btn-save" id="btnSaveUser" onclick="saveUser()">Salvar Usuário</button>
      </div>
    </div>
  </div>

  <!-- Log geral -->
  <div class="log-box" id="pageLog"></div>

  <!-- Lista -->
  <div class="sect" id="listSect" style="display:none">Usuários cadastrados</div>
  <div id="userList"></div>

</main>

<script>
/* ── Cole aqui a URL do Apps Script de Usuários ── */
const AUTH_URL = 'https://script.google.com/macros/s/AKfycbzqL0jofgg8B4viY7NyqWjaE36AwiK2IEqDWM2A5WXwlJb06p_xqo11TdIu4ubl28pl/exec';

/* ── JSONP — funciona com file:// (sem CORS) ── */
function jsonpGet(url, params) {
  return new Promise((resolve, reject) => {
    const cbName = '_pcb' + Date.now();
    const qs = Object.entries({...params, callback: cbName})
      .map(([k,v]) => encodeURIComponent(k)+'='+encodeURIComponent(v)).join('&');
    const script = document.createElement('script');
    script.src = url + '?' + qs;
    window[cbName] = (data) => { delete window[cbName]; script.remove(); resolve(data); };
    script.onerror = () => { delete window[cbName]; script.remove(); reject(new Error('Falha de conexão.')); };
    document.head.appendChild(script);
  });
}

/* ── THEME ── */
(function(){
  const h = document.documentElement;
  const t = localStorage.getItem('pulvion_theme') || 'light';
  h.setAttribute('data-theme', t);
  function apply(t){
    h.setAttribute('data-theme', t);
    localStorage.setItem('pulvion_theme', t);
    const ic = document.getElementById('thIcon');
    if(ic) ic.innerHTML = t==='dark'
      ?'<circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>'
      :'<path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>';
  }
  apply(t);
  document.addEventListener('DOMContentLoaded',()=>{
    const b=document.getElementById('thToggle');
    if(b) b.addEventListener('click',()=>apply(h.getAttribute('data-theme')==='dark'?'light':'dark'));
  });
})();

/* ── FORM ── */
let editMode = false;
function openForm(user=null){
  editMode = !!user;
  document.getElementById('formTitle').textContent = user ? 'Editar Usuário' : 'Novo Usuário';
  document.getElementById('editId').value    = user?.id    || '';
  document.getElementById('fNome').value     = user?.nome  || '';
  document.getElementById('fUsuario').value  = user?.usuario|| '';
  document.getElementById('fSenha').value    = user?.senha || '';
  document.getElementById('fTipo').value     = user?.tipo  || 'piloto';
  document.getElementById('fFrente').value   = user?.frente|| '';
  setLog('formLog','','');
  document.getElementById('formCard').classList.add('show');
  document.getElementById('fNome').focus();
  document.getElementById('formCard').scrollIntoView({behavior:'smooth',block:'start'});
}
function closeForm(){
  document.getElementById('formCard').classList.remove('show');
}

/* ── LOGS ── */
function setLog(id, msg, cls){
  const el = document.getElementById(id);
  if(!el) return;
  el.textContent = msg;
  el.className   = 'log-box' + (cls ? ' show '+cls : '');
}

/* ── SAVE ── */
async function saveUser(){
  const nome    = document.getElementById('fNome').value.trim();
  const usuario = document.getElementById('fUsuario').value.trim().toLowerCase();
  const senha   = document.getElementById('fSenha').value.trim();
  const tipo    = document.getElementById('fTipo').value;
  const frente  = document.getElementById('fFrente').value;
  const editId  = document.getElementById('editId').value;

  if(!nome || !usuario || !senha){ setLog('formLog','⚠ Preencha nome, usuário e senha.','err'); return; }

  const btn = document.getElementById('btnSaveUser');
  btn.disabled = true;
  setLog('formLog','Salvando…','loading');

  const payload = editMode
    ? { action:'updateUser', id:editId, nome, usuario, senha, tipo, frente }
    : { action:'createUser', nome, usuario, senha, tipo, frente };

  try {
    const data = await jsonpGet(AUTH_URL, payload);
    if(data.ok){
      setLog('formLog','✓ Salvo com sucesso!','ok');
      setTimeout(()=>{ closeForm(); loadUsers(); }, 900);
    } else {
      setLog('formLog','✗ '+data.error,'err');
    }
  } catch(e){ setLog('formLog','✗ Falha: '+e.message,'err'); }
  finally { btn.disabled = false; }
}

/* ── TOGGLE ── */
async function toggleUser(id, nome){
  if(!confirm(`Alterar status de "${nome}"?`)) return;
  try {
    const data = await jsonpGet(AUTH_URL, {action:'toggleUser', id});
    if(data.ok) loadUsers();
    else setLog('pageLog','✗ '+data.error,'err');
  } catch(e){ setLog('pageLog','✗ '+e.message,'err'); }
}

/* ── DELETE ── */
async function deleteUser(id, nome){
  if(!confirm(`Excluir "${nome}" permanentemente?`)) return;
  try {
    const data = await jsonpGet(AUTH_URL, {action:'deleteUser', id});
    if(data.ok){ setLog('pageLog','✓ Usuário excluído.','ok'); loadUsers(); }
    else setLog('pageLog','✗ '+data.error,'err');
  } catch(e){ setLog('pageLog','✗ '+e.message,'err'); }
}

/* ── RENDER ── */
function renderUsers(users){
  const list  = document.getElementById('userList');
  const sect  = document.getElementById('listSect');
  if(!users || !users.length){
    sect.style.display = 'none';
    list.innerHTML = `<div class="state-box"><div class="state-icon"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></div><div class="state-title">Nenhum usuário</div><div class="state-desc">Clique em "Adicionar Usuário" para criar o primeiro.</div></div>`;
    return;
  }
  sect.style.display = 'flex';
  list.innerHTML = users.map((u,i) => {
    const initials = (u.nome||'?').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
    const isAtivo  = u.ativo === true || u.ativo === 'true';
    const delay    = (i*0.05).toFixed(2);
    const toggleLbl = isAtivo ? 'Desativar' : 'Ativar';
    const toggleIcon = isAtivo
      ? '<path d="M10 15l-3-3 3-3"/><path d="M7 12h10"/>'  // x
      : '<polyline points="20 6 9 17 4 12"/>';              // check
    return `<div class="user-card${isAtivo?'':' inactive'}" style="animation-delay:${delay}s">
      <div class="uc-head">
        <div class="uc-avatar">${initials}</div>
        <div class="uc-info">
          <div class="uc-nome">${u.nome}</div>
          <div class="uc-sub">@${u.usuario}</div>
          <div class="uc-badges">
            <span class="badge ${u.tipo}">${u.tipo}</span>
            <span class="badge ${isAtivo?'ativo':'inativo'}">${isAtivo?'Ativo':'Inativo'}</span>
            ${u.frente ? `<span class="badge frente">Frente ${u.frente}</span>` : ''}
          </div>
        </div>
      </div>
      <div class="uc-actions">
        <button class="uc-action" onclick='openForm(${JSON.stringify(u)})'>
          <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          Editar
        </button>
        <button class="uc-action ${isAtivo?'toggle-on':'toggle-off'}" onclick="toggleUser('${u.id}','${u.nome}')">
          <svg viewBox="0 0 24 24">${toggleIcon}</svg>
          ${toggleLbl}
        </button>
        <button class="uc-action danger" onclick="deleteUser('${u.id}','${u.nome}')">
          <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
          Excluir
        </button>
      </div>
    </div>`;
  }).join('');
}

/* ── LOAD ── */
async function loadUsers(){
  if(AUTH_URL === 'COLE_AQUI_A_URL_DO_CODE_USUARIOS'){
    setLog('pageLog','⚠ Configure AUTH_URL no código desta página.','err');
    return;
  }
  setLog('pageLog','Carregando usuários…','loading');
  try {
    const data = await jsonpGet(AUTH_URL, {action:'getUsers'});
    if(data.ok){ setLog('pageLog','',''); renderUsers(data.users); }
    else setLog('pageLog','✗ '+data.error,'err');
  } catch(e){ setLog('pageLog','✗ '+e.message,'err'); }
}

document.addEventListener('DOMContentLoaded', loadUsers);
</script>

<script>
/* ── Pulvion: herança de tema do painel pai ── */
window.addEventListener('storage', function(e){
  if(e.key === 'pulvion_theme' && e.newValue){
    document.documentElement.setAttribute('data-theme', e.newValue);
  }
});
</script>
